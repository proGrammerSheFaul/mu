<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>3D Name Art</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #111 0%, #000 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      perspective: 1000px;
    }

    .text3d {
      font-size: 5em;
      font-weight: bold;
      background: linear-gradient(45deg, red, orange, yellow, lime, cyan, blue, magenta);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 10px rgba(255,255,255,0.2);
      animation: rainbow 6s ease infinite, rotate3d 8s linear infinite;
      transform-style: preserve-3d;
      transform-origin: center;
    }

    @keyframes rainbow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes rotate3d {
      0% { transform: rotateY(0deg) rotateX(0deg); }
      100% { transform: rotateY(360deg) rotateX(360deg); }
    }

    /* Optional glowing effect */
    .text3d::after {
      content: 'Tonima';
      position: absolute;
      top: 0;
      left: 0;
      color: white;
      opacity: 0.05;
      transform: translateZ(-20px);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="text3d">Miss You </div>
  </div>

  <script>
    // Optional: add some interaction
    document.addEventListener("mousemove", (e) => {
      const text = document.querySelector('.text3d');
      const x = (window.innerWidth / 2 - e.clientX) / 25;
      const y = (window.innerHeight / 2 - e.clientY) / 25;
      text.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    });
  </script>
</body>
</html>
